name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        shell: bash
        run: |
          files="$(gofmt -l .)"
          if [[ -n "$files" ]]; then
            echo "$files"
            exit 1
          fi

      - name: Check module consistency
        run: go mod tidy -diff

      - name: Verify downloaded modules
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -count=1 ./...

      - name: Test with race detector
        run: go test -race -count=1 ./...

      - name: Test pinned Floci integration
        env:
          CAILAB_DOCKER_INTEGRATION: "1"
        run: go test -count=1 -run '^TestFlociIntegration$' -v ./internal/provider

      - name: Test flagship cross-provider federation
        env:
          CAILAB_CROSS_PROVIDER_INTEGRATION: "1"
        run: go test -count=1 -run '^TestCrossProviderFederationIntegration$' -v ./internal/provider

      - name: Test flagship public CLI workflow
        env:
          CAILAB_CROSS_PROVIDER_E2E: "1"
        run: go test -count=1 -run '^TestCrossProviderCLIE2E$' -v ./internal/cli

      - name: Test Docker agent isolation
        env:
          CAILAB_AGENT_ISOLATION_INTEGRATION: "1"
        run: go test -count=1 -run '^TestDockerAgentIsolation' -v ./internal/agent ./internal/cli

      - name: Check documentation
        run: go run ./internal/tools/doccheck .

      - name: Validate scenario catalog
        run: go run ./cmd/cailab scenario list

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.6.0

      - name: Scan reachable vulnerabilities
        run: govulncheck ./...

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build CLI
        run: go build ./cmd/cailab

      - name: Test native facade lifecycles
        env:
          CAILAB_NATIVE_INTEGRATION: "1"
        run: go test -count=1 -run '^Test(Microsoft|Google|OIDC)NativeIntegration$' -v ./internal/provider

  clean-container-demo:
    name: Clean container demo
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      IMAGE: cailab-ci:${{ github.sha }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build pinned CI image
        run: >-
          docker build
          --file build/ci/Dockerfile
          --tag "$IMAGE"
          --build-arg "VERSION=0.0.0-ci.${GITHUB_RUN_NUMBER}"
          --build-arg "COMMIT=${GITHUB_SHA}"
          .

      - name: Validate final image contract
        shell: bash
        run: |
          user="$(docker image inspect --format '{{.Config.User}}' "$IMAGE")"
          ports="$(docker image inspect --format '{{json .Config.ExposedPorts}}' "$IMAGE")"
          volumes="$(docker image inspect --format '{{json .Config.Volumes}}' "$IMAGE")"
          entrypoint="$(docker image inspect --format '{{join .Config.Entrypoint " "}}' "$IMAGE")"
          [[ "$user" == "65532:65532" ]]
          [[ "$ports" == "null" ]]
          [[ "$volumes" == "null" ]]
          [[ "$entrypoint" == "/usr/local/bin/cailab-ci-demo" ]]
          container="$(docker create "$IMAGE")"
          trap 'docker rm --force "$container" >/dev/null' EXIT
          filesystem="$(docker export "$container" | tar -tf -)"
          if grep -Eq '^(src|go|usr/local/go)(/|$)' <<< "$filesystem"; then
            echo "final image contains a source or Go toolchain path" >&2
            exit 1
          fi
          docker run --rm --network none --read-only \
            --entrypoint /usr/local/bin/cailab "$IMAGE" version

      - name: Run network-isolated clean demo
        run: >-
          docker run --rm
          --network none
          --ipc none
          --read-only
          --tmpfs /tmp:rw,noexec,nosuid,nodev,size=64m,mode=1777,uid=65532,gid=65532
          --cap-drop ALL
          --security-opt no-new-privileges=true
          --security-opt seccomp=builtin
          --memory 256m
          --cpus 1
          --pids-limit 128
          --ulimit nofile=1024:1024
          "$IMAGE"
