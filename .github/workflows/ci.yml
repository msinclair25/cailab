name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        shell: bash
        run: |
          files="$(gofmt -l .)"
          if [[ -n "$files" ]]; then
            echo "$files"
            exit 1
          fi

      - name: Check module consistency
        run: go mod tidy -diff

      - name: Verify downloaded modules
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -count=1 ./...

      - name: Test with race detector
        run: go test -race -count=1 ./...

      - name: Test pinned Floci integration
        env:
          CAILAB_DOCKER_INTEGRATION: "1"
        run: go test -count=1 -run '^TestFlociIntegration$' -v ./internal/provider

      - name: Check documentation
        run: go run ./internal/tools/doccheck .

      - name: Validate scenario catalog
        run: go run ./cmd/cailab scenario list

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.6.0

      - name: Scan reachable vulnerabilities
        run: govulncheck ./...

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build CLI
        run: go build ./cmd/cailab

      - name: Test native facade lifecycles
        env:
          CAILAB_NATIVE_INTEGRATION: "1"
        run: go test -count=1 -run '^Test(Microsoft|Google|OIDC)NativeIntegration$' -v ./internal/provider
